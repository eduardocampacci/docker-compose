version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mattermost-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmuser-password
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - mattermost_net

  app:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost-app
    restart: unless-stopped
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://mmuser:mmuser-password@postgres:5432/mattermost?sslmode=disable"
      MM_SERVICESETTINGS_SITEURL: "http://192.168.1.117:8065"
    volumes:
      - ./data/config:/mattermost/config
      - ./data/data:/mattermost/data
      - ./data/logs:/mattermost/logs
      - ./data/plugins:/mattermost/plugins
      - ./data/client-plugins:/mattermost/client/plugins
    ports:
      - "8065:8065"
    depends_on:
      - postgres
    networks:
      - mattermost_net

networks:
  mattermost_net:
