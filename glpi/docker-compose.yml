version: '3.8'

services:
  glpi-db:
    image: mariadb:10.5
    container_name: glpi-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: glpi
      MYSQL_USER: glpi
      MYSQL_PASSWORD: glpi
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - glpi-network

  glpi:
    image: diouxx/glpi
    container_name: glpi
    restart: always
    ports:
      - "8080:80"
    environment:
      TIMEZONE: America/Sao_Paulo
    volumes:
      - ./glpi_data:/var/www/html/glpi
      - ./glpi_plugins:/var/www/html/glpi/plugins
      - ./glpi_files:/var/www/html/glpi/files
      - ./glpi_configs:/var/www/html/glpi/config
    networks:
      - glpi-network
    depends_on:
      - glpi-db

networks:
  glpi-network:
    driver: bridge
